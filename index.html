<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>互動記憶便利商店</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6ff;
}

h1 {
    margin-top: 20px;
}

.card {
    background: white;
    display: inline-block;
    padding: 20px;
    border-radius: 15px;
    width: 380px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

#items {
    font-size: 22px;
    margin: 10px 0;
    min-height: 40px;
}

button {
    padding: 10px 12px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#startBtn { background: #2196F3; color: white; }
#resetBtn { background: #f44336; color: white; }

#shop {
    margin-top: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
}

.itemBtn {
    background: #eee;
}

.itemBtn.correct {
    background: #4CAF50;
    color: white;
}

.itemBtn.wrong {
    background: #f44336;
    color: white;
}

#score {
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🏪 互動記憶便利商店</h1>

<div class="card">

<div id="items">按開始遊戲</div>

<button id="startBtn" onclick="startGame()">開始遊戲</button>
<button id="resetBtn" onclick="resetGame()">重置</button>

<div id="shop"></div>

<div id="score">分數：0</div>

</div>

<script>
const pool = [
    "牛奶","可樂","泡麵","飯糰","吐司",
    "咖啡","茶葉蛋","餅乾","巧克力","果汁",
    "沙拉","漢堡"
];

let target = [];
let canPlay = false;
let score = 0;

function startGame() {
    target = [];
    score = 0;
    canPlay = false;

    document.getElementById("score").innerText = "分數：0";
    document.getElementById("shop").innerHTML = "";

    // 隨機 5 個要記的
    while (target.length < 5) {
        let item = pool[Math.floor(Math.random() * pool.length)];
        if (!target.includes(item)) target.push(item);
    }

    document.getElementById("items").innerText =
        "🛒 記住這些：" + target.join(" ｜ ");

    setTimeout(() => {
        document.getElementById("items").innerText =
            "❓ 開始選擇你記得的商品！";

        canPlay = true;
        renderShop();
    }, 3000);
}

function renderShop() {
    const shop = document.getElementById("shop");
    shop.innerHTML = "";

    pool.forEach(item => {
        let btn = document.createElement("button");
        btn.innerText = item;
        btn.className = "itemBtn";

        btn.onclick = () => {
            if (!canPlay) return;

            if (target.includes(item)) {
                btn.classList.add("correct");
                score++;
            } else {
                btn.classList.add("wrong");
                score--;
            }

            document.getElementById("score").innerText =
                "分數：" + score;
        };

        shop.appendChild(btn);
    });
}

function resetGame() {
    target = [];
    canPlay = false;
    score = 0;

    document.getElementById("items").innerText = "按開始遊戲";
    document.getElementById("shop").innerHTML = "";
    document.getElementById("score").innerText = "分數：0";
}
</script>

</body>
</html>
