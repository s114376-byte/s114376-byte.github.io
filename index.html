<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>20秒便利商店挑戰</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f7ff;
        margin-top: 50px;
    }

    h1 {
        color: #333;
    }

    #shop {
        margin-top: 30px;
    }

    button {
        font-size: 20px;
        padding: 15px 25px;
        margin: 10px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background: #4CAF50;
        color: white;
    }

    button:disabled {
        background: #aaa;
        cursor: not-allowed;
    }

    #startBtn {
        background: #2196F3;
    }

    #resetBtn {
        background: #f44336;
    }

    #score {
        font-size: 24px;
        margin-top: 20px;
    }

    #time {
        font-size: 24px;
        color: #e91e63;
    }
</style>
</head>

<body>

<h1>🏪 20 秒便利商店挑戰</h1>

<p>在 20 秒內盡量點擊「買商品」！</p>

<div id="time">時間：20</div>
<div id="score">分數：0</div>

<div id="shop">
    <button id="buyBtn" disabled>🛒 買商品</button>
</div>

<br>

<button id="startBtn">開始遊戲</button>
<button id="resetBtn">重置</button>

<script>
let timeLeft = 20;
let score = 0;
let timer = null;
let playing = false;

const timeDisplay = document.getElementById("time");
const scoreDisplay = document.getElementById("score");
const buyBtn = document.getElementById("buyBtn");
const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");

function updateUI() {
    timeDisplay.textContent = "時間：" + timeLeft;
    scoreDisplay.textContent = "分數：" + score;
}

function startGame() {
    if (playing) return;

    playing = true;
    timeLeft = 20;
    score = 0;
    buyBtn.disabled = false;

    updateUI();

    timer = setInterval(() => {
        timeLeft--;
        updateUI();

        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);
}

function endGame() {
    clearInterval(timer);
    playing = false;
    buyBtn.disabled = true;
    alert("時間到！你的分數是：" + score);
}

function resetGame() {
    clearInterval(timer);
    playing = false;
    timeLeft = 20;
    score = 0;
    buyBtn.disabled = true;
    updateUI();
}

buyBtn.addEventListener("click", () => {
    if (!playing) return;
    score++;
    updateUI();
});

startBtn.addEventListener("click", startGame);
resetBtn.addEventListener("click", resetGame);

updateUI();
</script>

</body>
</html>
