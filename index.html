<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記憶翻牌遊戲</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:white;
}

#game{
    width:440px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(4,100px);
    gap:10px;
}

.card{
    width:100px;
    height:100px;
    background:#ffffff;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    box-shadow:0 3px 8px rgba(0,0,0,.3);
    user-select:none;
}

.hidden{
    background:#2c3e50;
    color:transparent;
}

#info{
    color:white;
    font-size:20px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🃏 記憶翻牌遊戲</h1>

<div id="info">
    步數：<span id="moves">0</span>
</div>

<div id="game"></div>

<button onclick="startGame()">重新開始</button>

<script>
const symbols = ["🍎","🍌","🍇","🍉","🍒","🍍","🥝","🍓"];

let cards = [];
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;
let moves = 0;

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(){

    cards = [...symbols, ...symbols];
    shuffle(cards);

    const game = document.getElementById("game");
    game.innerHTML="";

    firstCard=null;
    secondCard=null;
    lockBoard=false;
    matches=0;
    moves=0;

    document.getElementById("moves").textContent = moves;

    cards.forEach(symbol => {

        const card = document.createElement("div");
        card.classList.add("card","hidden");
        card.dataset.symbol = symbol;
        card.textContent = symbol;

        card.addEventListener("click", flipCard);

        game.appendChild(card);
    });
}

function flipCard(){

    if(lockBoard) return;
    if(!this.classList.contains("hidden")) return;

    this.classList.remove("hidden");

    if(!firstCard){
        firstCard=this;
        return;
    }

    secondCard=this;
    moves++;
    document.getElementById("moves").textContent = moves;

    checkMatch();
}

function checkMatch(){

    if(firstCard.dataset.symbol === secondCard.dataset.symbol){

        matches++;

        firstCard=null;
        secondCard=null;

        if(matches===symbols.length){

            setTimeout(()=>{
                alert(`恭喜完成！共用了 ${moves} 步！`);
            },300);
        }

    }else{

        lockBoard=true;

        setTimeout(()=>{

            firstCard.classList.add("hidden");
            secondCard.classList.add("hidden");

            firstCard=null;
            secondCard=null;
            lockBoard=false;

        },1000);
    }
}

startGame();
</script>

</body>
</html>
