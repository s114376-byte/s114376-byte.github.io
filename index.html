<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏪20秒便利商店挑戰</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
🏪 20秒便利商店挑戰
</div>

</header>

<div class="game">

<div class="top">

<div class="box">
<h3>🎯 目標金額</h3>
<p><span id="target">0</span> 元</p>
</div>

<div class="box">
<h3>🛒 已購買</h3>
<p><span id="total">0</span> 元</p>
</div>

<div class="box">
<h3>⏰ 剩餘時間</h3>
<p><span id="time">20</span> 秒</p>
</div>

</div>

<h2>商品區</h2>

<div id="products" class="products">

</div>

<div class="cart">

<h2>🛒 購物籃</h2>

<ul id="cartList">

</ul>

<h2 id="result"></h2>

<div class="buttons">

<button id="restartBtn">
重新開始
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
